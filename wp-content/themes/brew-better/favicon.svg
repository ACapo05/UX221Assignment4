<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Brew Better coffee cup">
  <title>Brew Better</title>
  <rect width="64" height="64" rx="12" fill="#1c0f07"/>
  <!-- Cup body -->
  <rect x="13" y="30" width="30" height="22" rx="5" fill="#b05c1e"/>
  <!-- Cup handle -->
  <path d="M43 36 Q54 36 54 44 Q54 52 43 52" stroke="#b05c1e" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Coffee surface -->
  <ellipse cx="28" cy="30" rx="15" ry="4" fill="#efe3cf"/>
  <!-- Steam -->
  <path d="M21 23 Q23 18 21 13" stroke="#faf7f2" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M28 21 Q30 16 28 11" stroke="#faf7f2" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M35 23 Q37 18 35 13" stroke="#faf7f2" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <!-- Saucer -->
